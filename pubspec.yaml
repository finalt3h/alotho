name: alo_tho
description: "Alo Tho - app ket noi nguoi dung va tho sua chua gan day."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  intl: ^0.20.2
  flutter_dotenv: ^6.0.0
  package_info_plus: ^8.3.0
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.12.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env.debug
    - .env.release
    - assets/login/
    - assets/splash/
    - assets/worker_detail/
